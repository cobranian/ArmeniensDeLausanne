name: Deploy site + daily agenda refresh

# Does two things in one workflow:
#   • On every push to main (e.g. a merge) → redeploy the site to Firebase
#     Hosting so content changes go live immediately.
#   • Once a day (and on manual dispatch) → re-scrape
#     https://armenopole.com/ArmenianEvents, commit js/agenda-data.js back to
#     main if anything changed, then redeploy.
#
# One-time setup required in the repository:
#   1. Settings → Secrets and variables → Actions → New repository secret
#      Name:  FIREBASE_SERVICE_ACCOUNT_ARMENIENSDELAUSANNE
#      Value: contents of a Firebase service-account JSON key.
#             Generate it via:
#               Firebase Console
#                 → Project settings
#                 → Service accounts
#                 → Generate new private key
#             Paste the entire JSON (including braces) as the secret value.
#   2. Settings → Actions → General → Workflow permissions
#      → "Read and write permissions" must be enabled so the bot can push
#        the refreshed js/agenda-data.js back to main.

on:
  push:
    # A merge to main redeploys the site immediately (see the deploy step's
    # `if`). The bot's own agenda commit is pushed with GITHUB_TOKEN, which
    # GitHub does NOT use to re-trigger workflows — so there is no deploy loop.
    branches: [main]
  schedule:
    # 02:00 UTC daily — early Europe morning (04:00 Lausanne in summer/CEST,
    # 03:00 in winter/CET).
    - cron: '0 2 * * *'
  workflow_dispatch: {}

# Avoid two refreshes racing each other; if a previous run is still
# going, queue the next one rather than running in parallel.
concurrency:
  group: agenda-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Action versions pinned (not floating) so a cron-driven workflow
      # doesn't silently change behaviour on us. Bumping is a deliberate edit.
      # checkout@v6 / setup-node@v6 both run on Node 24 (the GitHub default
      # from 2026-06-16). action-hosting-deploy@v0.10.0 still declares
      # Node 20 in its action.yml — GitHub will force-upgrade it to Node 24
      # on 2026-06-16; that should be safe (pure JS, no native deps). If
      # Firebase ships a Node 24 release later, re-pin here.

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install scraper dependency (cheerio)
        run: npm install --no-save --no-audit --no-fund cheerio@1

      - name: Scrape armenopole.com → js/agenda-data.js
        run: node scripts/scrape-armenopole.mjs

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- js/agenda-data.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No change to js/agenda-data.js."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "js/agenda-data.js updated:"
            git --no-pager diff --stat -- js/agenda-data.js
          fi

      - name: Commit refreshed data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "agenda-bot"
          git config user.email "agenda-bot@users.noreply.github.com"
          # The scraper rewrites the snapshot-date label in these two files
          # whenever the dataset changes; commit them alongside the data.
          git add js/agenda-data.js index.html js/i18n.js
          git commit -m "chore(agenda): refresh from armenopole.com"
          git push

      - name: Deploy to Firebase Hosting
        # Deploy when the agenda data changed (any trigger), and always on a
        # push (a merge to main) or a manual dispatch — i.e. everything except
        # a no-change scheduled run.
        if: steps.diff.outputs.changed == 'true' || github.event_name != 'schedule'
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ARMENIENSDELAUSANNE }}
          projectId: armeniensdelausanne
          channelId: live
